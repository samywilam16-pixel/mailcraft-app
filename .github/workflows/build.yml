import flet as ft
import requests
import os
import time
import threading

# OpenAI API Key Configuration
OPENAI_API_KEY = os.environ.get("OPENAI_KEY", "YOUR_OPENAI_API_KEY_HERE")

def main(page: ft.Page):
    page.title = "MailCraft AI - Premium Assistant"
    page.theme_mode = ft.ThemeMode.DARK
    page.scroll = ft.ScrollMode.ADAPTIVE
    page.horizontal_alignment = ft.CrossAxisAlignment.CENTER
    page.padding = 25
    
    # Karas Wallet and TON Price (~$35 USD)
    MY_WALLET = "UQCQx7O07fVlhRAt8MInuE5pLp4ZclFshNfR0V9eFmfxDWUZ"
    TON_PRICE = 5.0  
    
    is_premium_unlocked = False

    # Header Interface
    header = ft.Container(
        content=ft.Column([
            ft.Text("MAILCRAFT AI", size=30, weight=ft.FontWeight.BOLD, color=ft.colors.INDIGO_ACCENT, letter_spacing=2),
            ft.Text("The Ultimate AI Email Assistant for US Professionals", size=13, color=ft.colors.GREY_400),
            ft.Container(
                content=ft.Text(f"PREMIUM PLAN: 5 TON (~$35) / Month", size=11, weight=ft.FontWeight.BOLD, color=ft.colors.WHITE),
                bgcolor=ft.colors.INDIGO_700, padding=6, border_radius=5, margin=ft.margin.only(top=5)
            )
        ], horizontal_alignment=ft.CrossAxisAlignment.CENTER),
        margin=ft.margin.only(bottom=15)
    )
    
    # Main Input Fields (Disabled until premium is unlocked)
    email_prompt = ft.TextField(
        label="What do you want to say in the email? (Short note)", 
        hint_text="e.g., Ask the client to reschedule tomorrow's meeting.", 
        multiline=True, min_lines=3, max_lines=5, border_color=ft.colors.INDIGO_ACCENT,
        disabled=True  
    )
    
    tone_dropdown = ft.Dropdown(
        label="Choose Email Tone", 
        border_color=ft.colors.INDIGO_ACCENT, 
        options=[
            ft.dropdown.Option("Professional & Formal"), 
            ft.dropdown.Option("Friendly & Casual"), 
            ft.dropdown.Option("Persuasive (Sales/Pitch)")
        ], 
        value="Professional & Formal",
        disabled=True  
    )
    
    output_box = ft.TextField(
        label="Your Generated Professional Email", 
        multiline=True, min_lines=8, max_lines=15, 
        read_only=True, bgcolor=ft.colors.BLACK
    )
    
    loading_ring = ft.ProgressRing(visible=False, color=ft.colors.INDIGO_ACCENT)
    status_text = ft.Text("🔒 Please Upgrade to Premium to unlock the AI Assistant.", color=ft.colors.YELLOW_ACCENT)

    # OpenAI GPT Generation Logic
    def generate_email_logic(e):
        nonlocal is_premium_unlocked
        if not is_premium_unlocked:
            status_text.value = "❌ Access Denied: Subscription Required!"
            page.update()
            return
            
        if not email_prompt.value:
            status_text.value = "Please enter some details first!"
            page.update()
            return
            
        loading_ring.visible = True
        status_text.value = "Crafting email using GPT-4o..."
        page.update()

        headers = {"Authorization": f"Bearer {OPENAI_API_KEY}", "Content-Type": "application/json"}
        gpt_payload = {
            "model": "gpt-4o",
            "messages": [
                {"role": "system", "content": f"Write a flawless professional business email based on the user's notes. Style: {tone_dropdown.value}."},
                {"role": "user", "content": email_prompt.value}
            ],
            "temperature": 0.7
        }
        try:
            response = requests.post("https://openai.com", headers=headers, json=gpt_payload)
            if response.status_code == 200:
                output_box.value = response.json()["choices"]["message"]["content"]
                status_text.value = "Email generated successfully!"
            else:
                status_text.value = "API Error: Setup your OpenAI API key balance."
        except Exception as ex:
            status_text.value = f"Error: {str(ex)}"
        loading_ring.visible = False
        page.update()

    # Function to activate premium instantly
    def unlock_premium_features():
        nonlocal is_premium_unlocked
        is_premium_unlocked = True
        email_prompt.disabled = False
        tone_dropdown.disabled = False
        generate_btn.disabled = False
        upgrade_btn.visible = False
        status_text.value = "🎉 Premium Unlocked Automatically! You can now use the AI."
        status_text.color = ft.colors.GREEN_ACCENT_400
        page.update()

    # Blockchain Observer (Runs in background thread)
    def blockchain_payment_checker():
        url = f"https://tonapi.io{MY_WALLET}/transactions"
        while not is_premium_unlocked:
            try:
                res = requests.get(url)
                if res.status_code == 200:
                    txs = res.json().get("transactions", [])
                    for tx in txs:
                        in_msg = tx.get("in_msg", {})
                        if in_msg:
                            comment = in_msg.get("decoded_body", {}).get("text", "")
                            value = int(in_msg.get("value", 0)) / 1000000000 
                            
                            # Automatically detects if the US client sent the TON payment
                            if "MailCraft_Premium" in comment and value >= TON_PRICE:
                                unlock_premium_features()
                                return
            except:
                pass
            time.sleep(8) 

    # Opens Tonkeeper and starts the automated verification process
    def handle_subscribe_click(e):
        nanotons = int(TON_PRICE * 1000000000)
        comment = "MailCraft_Premium_Subscription"
        ton_url = f"https://tonkeeper.com{MY_WALLET}?amount={nanotons}&text={comment}"
        page.launch_url(ton_url)
        
        status_text.value = "🔄 Waiting for blockchain confirmation... Please approve in Tonkeeper."
        page.update()
        
        threading.Thread(target=blockchain_payment_checker, daemon=True).start()

    def open_paywall(e):
        def close_paywall(ex):
            paywall_dialog.open = False
            page.update()
            
        paywall_dialog = ft.AlertDialog(
            title=ft.Text("Upgrade to MailCraft Pro"),
            content=ft.Column([
                ft.Text("Unlock unlimited professional AI email generations for just 5 TON (~$35)/mo."),
                ft.ElevatedButton("Pay with Tonkeeper", icon=ft.icons.ACCOUNT_BALANCE_WALLET, on_click=handle_subscribe_click, bgcolor=ft.colors.INDIGO_ACCENT, color=ft.colors.WHITE)
            ], height=120, width=300, tight=True),
            actions=[ft.TextButton("Maybe Later", on_click=close_paywall)]
        )
        page.overlay.append(paywall_dialog)
        paywall_dialog.open = True
        page.update()

    generate_btn = ft.ElevatedButton(
        "GENERATE EMAIL", icon=ft.icons.AUTO_AWESOME, 
        on_click=generate_email_logic, 
        style=ft.ButtonStyle(bgcolor=ft.colors.INDIGO_ACCENT, color=ft.colors.WHITE),
        disabled=True
    )
    
    upgrade_btn = ft.ElevatedButton(
        "👑 Go Premium ($35/mo)", 
        on_click=open_paywall, 
        style=ft.ButtonStyle(color=ft.colors.BLACK, bgcolor=ft.colors.YELLOW_ACCENT, weight=ft.FontWeight.BOLD)
    )

    page.add(
        header, upgrade_btn, ft.Divider(color=ft.colors.GREY_800), 
        email_prompt, tone_dropdown, 
        ft.Container(content=ft.Column([generate_btn, loading_ring, status_text], horizontal_alignment=ft.CrossAxisAlignment.CENTER), padding=10), 
        ft.Divider(color=ft.colors.GREY_800), output_box
    )

ft.app(target=main)
