name: Build Flet APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        pip install flet requests
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'
        
    - name: Create Flet App Structure
      run: |
        flet create . --template app
        
    - name: Build APK
      run: |
        flet build apk
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MailCraft-AI-APK
        path: build/apk/*.apk
